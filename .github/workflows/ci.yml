name: CI
on:
  push:
    branches:
      - master
  pull_request:

# Only run on the latest ref
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - name: Format
        run: cargo fmt --all -- --check

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-docs
      - name: Documentation
        env:
          DOCS_RS: 1
        run: cargo doc --no-deps --features full-async,parallel,doc-cfg,bindgen
      - name: Upload docs
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: |
            target/doc/rquickjs
            target/doc/rquickjs-sys
            target/doc/rquickjs-macro

  check:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy
      - name: Cargo clippy
        run: cargo clippy --all --all-targets --features full-async,bindgen

  msrv:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        msrv: [1.87.0]
    name: ubuntu / ${{ matrix.msrv }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install ${{ matrix.msrv }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.msrv }}
      - name: cargo +${{ matrix.msrv }} check
        run: cargo +${{ matrix.msrv }} check --features full-async,bindgen

  coverage:
    runs-on: ubuntu-latest
    name: ubuntu / stable / coverage
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - name: cargo install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo llvm-cov
        run: cargo llvm-cov --locked --no-default-features --features full-async,compile-tests,bindgen --workspace --lcov --output-path lcov.info
      - name: Record Rust version
        run: echo "RUST=$(rustc --version)" >> "$GITHUB_ENV"
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,RUST

  sanitizer:
    runs-on: ubuntu-latest
    name: ubuntu / nightly / sanitizer
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: Run tests with address sanitizer
        run: CC=clang RUSTFLAGS=-Zsanitizer=address cargo test --tests --workspace -Zbuild-std --target x86_64-unknown-linux-gnu --locked --no-default-features --features full-async,bindgen
      - name: Run tests with thread sanitizer
        run: CC=clang RUSTFLAGS=-Zsanitizer=thread cargo test --tests --workspace -Zbuild-std --target x86_64-unknown-linux-gnu --locked --no-default-features --features full-async,bindgen
      - name: Run tests with memory sanitizer
        run: CC=clang RUSTFLAGS=-Zsanitizer=memory cargo test --tests --workspace -Zbuild-std --target x86_64-unknown-linux-gnu --locked --no-default-features --features full-async,bindgen

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run examples
        working-directory: examples
        run: make run

  test:
    needs:
      - format
      - doc
      - check
      - msrv
      - coverage
    strategy:
      fail-fast: ${{ startsWith(github.ref, 'refs/tags/') }}
      matrix:
        include:
          # Cross-compiled Linux targets via cargo-zigbuild + QEMU.
          - { task: test, os: ubuntu-latest, rust: stable,  target: i686-unknown-linux-gnu,         features: full-async, builder: zigbuild }
          - { task: test, os: ubuntu-latest, rust: stable,  target: x86_64-unknown-linux-musl,      features: full-async, builder: zigbuild }
          - { task: test, os: ubuntu-latest, rust: stable,  target: aarch64-unknown-linux-gnu,      features: full-async, builder: zigbuild, qemu: aarch64 }
          - { task: test, os: ubuntu-latest, rust: stable,  target: aarch64-unknown-linux-musl,     features: full-async, builder: zigbuild, qemu: aarch64 }
          - { task: test, os: ubuntu-latest, rust: stable,  target: armv7-unknown-linux-gnueabihf,  features: full-async, builder: zigbuild, qemu: arm }
          - { task: test, os: ubuntu-latest, rust: stable,  target: powerpc64-unknown-linux-gnu,    features: full-async, builder: zigbuild, qemu: ppc64 }
          - { task: test, os: ubuntu-24.04,  rust: nightly, target: loongarch64-unknown-linux-gnu,  features: full-async, builder: zigbuild, qemu: loongarch64 }
          - { task: test, os: ubuntu-24.04,  rust: nightly, target: loongarch64-unknown-linux-musl, features: full-async, builder: zigbuild, qemu: loongarch64 }

          # Native targets.
          - { task: test, os: ubuntu-latest, rust: stable,  target: x86_64-unknown-linux-gnu,  features: full-async, builder: native }

          - { task: test, os: macos-latest,  rust: stable,  target: x86_64-apple-darwin,  features: full-async, builder: native }
          - { task: test, os: macos-latest,  rust: stable,  target: aarch64-apple-darwin, features: full-async, builder: native, no-test: true }

          - { task: test, os: windows-latest, rust: stable, target: x86_64-pc-windows-gnu,   features: full-async, builder: msys2 }
          - { task: test, os: windows-latest, rust: stable, target: x86_64-pc-windows-msvc,  features: full-async, builder: native, optimization: true }
          - { task: test, os: windows-11-arm, rust: stable, target: aarch64-pc-windows-msvc, features: full-async, builder: native }

          # WebAssembly targets (wasmtime runner).
          - { task: test, os: ubuntu-latest, rust: stable,  target: wasm32-wasip1, features: full-async-wasi, builder: native, wasi: true }
          - { task: test, os: ubuntu-latest, rust: nightly, target: wasm32-wasip2, features: full-async-wasi, builder: native, wasi: true }

          # Feature matrix (native x86_64 Linux).
          - { task: features, os: ubuntu-latest, rust: stable, target: x86_64-unknown-linux-gnu, features: rust-alloc,          builder: native }
          - { task: features, os: ubuntu-latest, rust: stable, target: x86_64-unknown-linux-gnu, features: loader,              builder: native }
          - { task: features, os: ubuntu-latest, rust: stable, target: x86_64-unknown-linux-gnu, features: futures,             builder: native }
          - { task: features, os: ubuntu-latest, rust: stable, target: x86_64-unknown-linux-gnu, features: parallel,            builder: native }
          - { task: features, os: ubuntu-latest, rust: stable, target: x86_64-unknown-linux-gnu, features: disable-assertions, builder: native }
          - { task: features, os: ubuntu-latest, rust: stable, target: x86_64-unknown-linux-gnu, features: half,                builder: native }

          # Channel matrix (native x86_64 Linux).
          - { task: channels, os: ubuntu-latest, rust: stable,  target: x86_64-unknown-linux-gnu, features: full-async, builder: native }
          - { task: channels, os: ubuntu-latest, rust: beta,    target: x86_64-unknown-linux-gnu, features: full-async, builder: native }
          - { task: channels, os: ubuntu-latest, rust: nightly, target: x86_64-unknown-linux-gnu, features: full-async, builder: native }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up zig
        if: matrix.builder == 'zigbuild'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install QEMU user emulation
        if: matrix.qemu
        run: |
          sudo apt-get update -y
          sudo apt-get install -y qemu-user
          QEMU_TARGET=$(printf "${{ matrix.target }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          echo "CARGO_TARGET_${QEMU_TARGET}_RUNNER=qemu-${{ matrix.qemu }}" >> "$GITHUB_ENV"

      - name: Set up wasmtime
        if: matrix.wasi
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - name: Configure wasmtime runner
        if: matrix.wasi
        shell: bash
        run: |
          WASI_TARGET=$(printf "${{ matrix.target }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          echo "CARGO_TARGET_${WASI_TARGET}_RUNNER=wasmtime" >> "$GITHUB_ENV"

      - name: Set up msys2
        if: matrix.builder == 'msys2'
        uses: msys2/setup-msys2@v2
        with:
          release: false

      - name: Prepare msys2 env
        if: matrix.builder == 'msys2'
        shell: pwsh
        run: |
          New-Item -Path "C:\Program Files\LLVM\x86_64-w64-mingw32" -ItemType SymbolicLink -Value "C:\msys64\mingw64\x86_64-w64-mingw32"
          New-Item -Path "C:\Program Files\LLVM\i686-w64-mingw32" -ItemType SymbolicLink -Value "C:\msys64\mingw64\i686-w64-mingw32"
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\msys64\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
          echo "CC_i686_pc_windows_gnu=i686-w64-mingw32-gcc"     | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          target: ${{ matrix.target }}
          components: rustfmt rust-src

      - name: Update deps
        run: cargo update

      - name: Build
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "${{ matrix.builder }}" = "zigbuild" ]; then
            cargo zigbuild ${{ matrix.optimization && '--release' || '' }} --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
          else
            cargo build ${{ matrix.optimization && '--release' || '' }} --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
          fi

      - name: Test
        if: ${{ !matrix.no-test }}
        timeout-minutes: 12
        shell: bash
        env:
          RUST_BACKTRACE: full
        run: |
          # Limit test threads on QEMU-emulated targets to work around an intermittent
          # QEMU user-mode emulation bug: "QEMU internal SIGSEGV {code=MAPERR, addr=0x20}"
          if [ -n "${{ matrix.qemu }}" ]; then
            export RUST_TEST_THREADS=1
          fi
          if [ "${{ matrix.builder }}" = "zigbuild" ]; then
            cargo-zigbuild test ${{ matrix.optimization && '--release' || '' }} --all --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
          elif [ "${{ matrix.wasi }}" = "true" ]; then
            cargo test ${{ matrix.optimization && '--release' || '' }} --all --exclude module-loader --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
          else
            cargo test ${{ matrix.optimization && '--release' || '' }} --all --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
          fi
